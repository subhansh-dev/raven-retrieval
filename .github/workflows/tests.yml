name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies (numpy/scipy/sklearn only — no torch)
      run: |
        pip install numpy scipy scikit-learn tqdm

    - name: Run core tests (utils, metrics, maxsim, compression, significance)
      run: |
        PYTHONIOENCODING=utf-8 PYTHONUTF8=1 python tests/run_core_tests.py

    - name: Run smoke tests (dependency-injected pipelines, skipped if deps missing)
      run: |
        pip install pytest
        PYTHONIOENCODING=utf-8 PYTHONUTF8=1 python -m pytest tests/test_utils.py tests/test_metrics.py tests/test_pipelines_smoke.py -q

  test-full:
    runs-on: ubuntu-latest
    needs: test-core

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install full dependencies
      run: |
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Run full test suite
      run: |
        PYTHONIOENCODING=utf-8 PYTHONUTF8=1 python -m pytest tests/ -v --tb=short

  benchmark:
    runs-on: ubuntu-latest
    needs: test-full

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run fast benchmark (baselines only, tiny corpus — fits CI RAM)
      run: |
        PYTHONIOENCODING=utf-8 PYTHONUTF8=1 \
        python run_enhanced_benchmark.py --dataset scifact --max-queries 10 \
          --max-docs 200 --skip-heavy

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: experiments/runs/