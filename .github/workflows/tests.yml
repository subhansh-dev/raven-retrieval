name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install numpy scipy scikit-learn rank-bm25 umap-learn tqdm

    - name: Run core tests
      run: python tests/run_core_tests.py

  test-full:
    runs-on: ubuntu-latest
    needs: test-core

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run full tests
      run: python -m pytest tests/ -v --tb=short

  benchmark:
    runs-on: ubuntu-latest
    needs: test-full

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run fast benchmark
      run: |
        python run_enhanced_benchmark.py --dataset scifact --max-queries 20 --skip-heavy

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: experiments/runs/
