# Full Ablation: All pipelines on SciFact
# Use for comprehensive comparison

dataset: scifact
max_queries: 100
seed: 42

pipelines:
  - naive_dense
  - hybrid_rag
  - hyde
  - splade
  - splade_hybrid
  - bm25_prf
  - contextual_hybrid
  - late_chunking
  - late_interaction
  - raptor_single_vector
  - raptor_late_collapsed
  - raptor_late_traversal

encoder:
  model_name: bert-base-uncased
  projection_dim: 128
  projection_init: xavier

chunking:
  chunk_size: 200
  chunk_overlap: 50

summarizer:
  fallback_to_extractive: true

retrieval:
  top_k: 10
  first_stage_k: 100

evaluation:
  k_values: [1, 3, 5, 10, 100]
  n_resamples: 10000
  alpha: 0.05
  correction: bonferroni
