# SciFact: Single-hop scientific claim verification
# Expected: Dense > Hybrid, Late Interaction < Dense (untrained projection)

dataset: scifact
max_queries: 100
seed: 42

pipelines:
  - naive_dense
  - hybrid_rag
  - hyde
  - bm25_prf
  - contextual_hybrid

encoder:
  model_name: bert-base-uncased
  projection_dim: 128
  projection_init: xavier

chunking:
  chunk_size: 200
  chunk_overlap: 50

retrieval:
  top_k: 10
  rrf_k: 60

evaluation:
  k_values: [1, 3, 5, 10, 100]
  n_resamples: 10000
  alpha: 0.05
